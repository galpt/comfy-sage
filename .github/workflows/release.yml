name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version component to increment
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  compute-version:
    name: Compute next version
    runs-on: ubuntu-24.04
    outputs:
      new_version: ${{ steps.compute.outputs.new_version }}
      new_tag: ${{ steps.compute.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute semver bump from VERSION
        id: compute
        run: |
          python3 - <<'PYTHON'
          from pathlib import Path
          import os

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          major, minor, patch = (int(part) for part in version.split("."))
          bump = "${{ inputs.bump }}"

          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          new_tag = f"v{new_version}"
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          github_output.write_text(
              f"new_version={new_version}\nnew_tag={new_tag}\n",
              encoding="utf-8",
          )
          print(f"Current version: {version}")
          print(f"New version: {new_version}")
          print(f"Tag: {new_tag}")
          PYTHON

  validate:
    name: Validate release inputs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Validate launcher and packager
        run: |
          bash -n launch-comfy.sh
          shellcheck -x launch-comfy.sh
          python3 -m py_compile scripts/release/package_release.py

  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    needs: [compute-version, validate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VERSION
        run: |
          printf '%s\n' "${{ needs.compute-version.outputs.new_version }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release ${{ needs.compute-version.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Build release zip
        run: |
          python3 scripts/release/package_release.py \
            --version "${{ needs.compute-version.outputs.new_version }}" \
            --output-dir dist

      - name: Create and push git tag
        run: |
          git tag "${{ needs.compute-version.outputs.new_tag }}"
          git push origin "${{ needs.compute-version.outputs.new_tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute-version.outputs.new_tag }}
          name: ${{ needs.compute-version.outputs.new_tag }}
          files: |
            dist/comfy-sage-linux-x86_64-v${{ needs.compute-version.outputs.new_version }}.zip
            dist/comfy-sage-linux-x86_64-v${{ needs.compute-version.outputs.new_version }}.zip.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
